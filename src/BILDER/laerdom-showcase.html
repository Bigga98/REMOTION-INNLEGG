<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1740px;
  height: 990px;
  background: linear-gradient(145deg, #1a2a3a, #0f1f2e, #0a1520);
  overflow: hidden;
  display: flex;
  justify-content: center;
}
.frame {
  width: 460px;
  margin-top: 60px;
  border-radius: 12px 12px 0 0;
  padding: 5px 5px 0;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-bottom: none;
  box-shadow: 0 40px 120px rgba(26, 42, 58, 0.4), 0 16px 40px rgba(0,0,0,0.3);
  flex-shrink: 0;
}
.inner {
  overflow: hidden;
  border-radius: 8px 8px 0 0;
  height: 950px;
}
.inner img {
  width: 100%;
  display: block;
}
</style>
</head>
<body>
<div class="frame">
  <div class="inner">
    <img src="laerdom-fullpage.png" alt="Lærdom">
  </div>
</div>
</body>
</html>
